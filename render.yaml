services:
  - type: web
    name: terraria-wasm
    env: static
    buildCommand: pnpm install && pnpm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cross-Origin-Embedder-Policy
        value: require-corp
      - path: /*
        name: Cross-Origin-Opener-Policy
        value: same-origin
